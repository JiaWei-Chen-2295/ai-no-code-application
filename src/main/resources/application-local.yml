spring:
  application:
    name: ai-no-code-application
  session:
    store-type: redis
    # session 30 天过期
    timeout: 2592000
  datasource:
    url: jdbc:mysql://localhost:3306/ai_no_code
    username: root
    password: cjw2295cjw


  data:
    redis:
      host: localhost
      port: 6379
      ttl: 3600
  main:
    allow-circular-references: true

server:
  port: 8081
  servlet:
    context-path: /api
    session:
        cookie:
          max-age: 2592000
# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: fun.javierchen.ainocodeapplication.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn
# AI
langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${DASHSCOPE_API_KEY}
      model-name: glm-5
      log-requests: true
      log-responses: true
    streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${DASHSCOPE_API_KEY}
      model-name: glm-5
      max-tokens: 8192
      log-requests: true
      log-responses: true

# MyBatis-Flex SQL日志配置
mybatis-flex:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
